name: wheels-dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CIBW_BUILD_VERBOSITY: 1
  CIBW_SKIP: "*-musllinux*"
  CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
  CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34
  CIBW_TEST_COMMAND: "python -c \"import slangpy\""
  CIBW_BEFORE_ALL_LINUX: yum install -y zip wayland-devel libxkbcommon-devel libXcursor-devel libXi-devel libXinerama-devel libXrandr-devel ninja-build perl-IPC-Cmd kernel-headers perl-FindBin perl-Time-Piece perl-lib clang
  CIBW_ENVIRONMENT: BUILD_RELEASE_WHEEL=1 SLANGPY_DEV_SUFFIX=$SLANGPY_DEV_SUFFIX
  MACOSX_DEPLOYMENT_TARGET: 14.0
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  CIBW_REPAIR_WHEEL_COMMAND_MACOS: "bash .github/scripts/sign_macos_bins.sh {wheel} {dest_dir}"

jobs:
  wheels:
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: [windows, linux, macos]
        platform: [x86_64, aarch64]
        python: [cp39, cp310, cp311, cp312, cp313]
        exclude:
          - { os: windows, platform: aarch64 }
          - { os: macos, platform: x86_64 }
        include:
          - { os: windows, runs-on: [windows-latest] }
          - { os: linux, runs-on: [ubuntu-latest] }
          - { os: macos, runs-on: [macos-latest] }

    steps:
      - name: Set up QEMU
        if: matrix.os == 'linux' && matrix.platform == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute dev version suffix
        shell: bash
        run: echo "SLANGPY_DEV_SUFFIX=dev0+g${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set CIBW_ARCHS
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos" ]; then
            echo "CIBW_ARCHS=arm64" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "windows" ]; then
            echo "CIBW_ARCHS=AMD64" >> $GITHUB_ENV
          else
            echo "CIBW_ARCHS=${{ matrix.platform }}" >> $GITHUB_ENV
          fi

      - name: Override march for aarch64 cross-compilation
        if: matrix.os == 'linux' && matrix.platform == 'aarch64'
        shell: bash
        run: |
          echo 'CIBW_ENVIRONMENT_LINUX=BUILD_RELEASE_WHEEL=1 SLANGPY_DEV_SUFFIX=$SLANGPY_DEV_SUFFIX CMAKE_CXX_FLAGS=-march=armv8-a CMAKE_C_FLAGS=-march=armv8-a' >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.0.0rc1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build wheels
        env:
          CIBW_BUILD: ${{ matrix.python }}-*
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-dev-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  slangpy_torch:
    name: Build slangpy-torch sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Patch dev version
        shell: bash
        run: |
          SHA7=$(echo $GITHUB_SHA | cut -c1-7)
          sed -i "s/^version = .*/version = \"0.7.0.dev0+g${SHA7}\"/" src/slangpy_torch/pyproject.toml

      - name: Build sdist
        working-directory: src/slangpy_torch
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: slangpy-torch-sdist
          path: src/slangpy_torch/dist/*.tar.gz

  upload_artifactory:
    name: Upload dev wheels to Artifactory
    runs-on: ubuntu-latest
    needs: [wheels, slangpy_torch]

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-dev-*
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: slangpy-torch-sdist
          path: artifacts/slangpy-torch

      - name: Collect artifacts
        run: |
          mkdir -p dist/
          find artifacts/ -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} dist/

      - name: Install twine
        run: pip install twine

      - name: Upload to Artifactory
        env:
          TWINE_USERNAME: ${{ secrets.NV_ARTIFACTORY_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.NV_ARTIFACTORY_PASSWORD }}
          TWINE_REPOSITORY_URL: https://artifactory.nvidia.com/artifactory/api/pypi/sw-slangpy-pypi-local
        run: twine upload dist/*.whl
